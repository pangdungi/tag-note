<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/pwa-512.png" type="image/png" sizes="512x512" />
    <link rel="icon" type="image/png" href="/pwa-512.png" sizes="512x512" />
    <link rel="apple-touch-icon" href="/pwa-512.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="태그로 정리하는 메모 — 태그노트" />
    <link
      rel="preload"
      href="/fonts/SpoqaHanSansNeo-Regular.otf"
      as="font"
      type="font/otf"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/DOSGothic.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <title>태그노트</title>
    <style>
      #app-boot-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483646;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: max(1.5rem, env(safe-area-inset-top, 0px))
          max(1.25rem, env(safe-area-inset-right, 0px))
          max(1.5rem, env(safe-area-inset-bottom, 0px))
          max(1.25rem, env(safe-area-inset-left, 0px));
        background: #ffffff;
        transition: opacity 0.25s ease;
      }

      #app-boot-splash.app-boot-splash--hide {
        opacity: 0;
        pointer-events: none;
      }

      #app-boot-splash img {
        display: block;
        width: min(78vw, 300px);
        height: auto;
        max-height: 52vh;
        object-fit: contain;
      }

      #app-boot-splash p {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo',
          'Malgun Gothic', sans-serif;
        font-size: 0.88rem;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <div id="app-boot-splash" role="status" aria-live="polite">
      <img src="/splash-screen.png" alt="" width="300" height="375" />
      <p>태그노트 준비 중…</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
